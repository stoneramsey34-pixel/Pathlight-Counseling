<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Pathlight Counseling</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,500&display=swap');
    :root {
      --bg: #f7f3ee; --ink: #1a2420; --muted: #5c6b5e;
      --accent: #3a6b52; --accent-hover: #2d5440; --white: #fdfaf6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
    .num { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(96px, 18vw, 180px); font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 24px; }
    h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(28px, 4vw, 42px); font-weight: 300; color: var(--ink); margin-bottom: 16px; }
    p { font-size: 16px; font-weight: 300; color: var(--muted); max-width: 420px; line-height: 1.75; margin-bottom: 40px; }
    a.btn { font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; background: var(--accent); color: var(--white); padding: 14px 28px; text-decoration: none; transition: background 0.25s; }
    a.btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="num">404</div>
  <h1>Page not found.</h1>
  <p>The page you're looking for doesn't exist or may have moved. Let's get you back to somewhere useful.</p>
  <a class="btn" href="index.html">Back to Home</a>
</body>
</html>
